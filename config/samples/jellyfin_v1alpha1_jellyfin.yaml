apiVersion: jellyfin.jellyops.io/v1alpha1
kind: Jellyfin
metadata:
  name: home-media
  namespace: media
  labels:
    app.kubernetes.io/name: jellyops
spec:
  image: harbor.bne1.ouchi.com.au/applications/jellyfin-server:12.0.0 # plugin-free v12; tag drives ABI gating
  replicas: 1
  storage:
    config:
      size: 10Gi
      storageClassName: fast-ssd
    cache:
      size: 5Gi
    media:
      - name: movies
        mountPath: /media/movies
        readOnly: true
        nfs:
          server: 10.0.0.10
          path: /export/movies
          mountOptions: ["nfsvers=4.1", "hard"]
        library:
          name: Movies
          collectionType: movies
      - name: tv
        mountPath: /media/tv
        nfs:
          server: 10.0.0.10
          path: /export/tv
          provision: true # shared RWX PV+PVC so workers can reuse it (§8.2)
          storageClassName: nfs-media
        library:
          name: Shows
          collectionType: tvshows
      - name: home-videos
        mountPath: /media/home-videos
        existingClaim: home-videos-pvc
        # no library block -> mounted on disk but NOT registered as a Jellyfin library
  api:
    mode: bootstrap # first-run wizard, mints an API key
    generatedSecretName: home-media-api
    manageLibraries: true
    prune: true
    refreshLibraryOnChange: true
  transcoding: # bounds transcode-cache growth; requires the api block above
    throttle:
      enabled: true # pause a transcode once it runs far enough ahead of the player
      delaySeconds: 180 # optional; Jellyfin default
    segmentDeletion:
      enabled: true # delete already-played segments during playback
      keepSeconds: 720 # optional; Jellyfin default
  service:
    type: ClusterIP
  ingress:
    className: nginx
    host: jellyfin.example.com
    tls:
      secretName: jellyfin-tls
  hardwareAcceleration:
    type: vaapi
    devicePath: /dev/dri/renderD128
    renderGroupGID: 44
  pluginSelector:
    matchLabels:
      jellyfin.jellyops.io/instance: home-media
  # web: # Uncomment to deploy a separate web-tier (jellyfin-web/nginx)
  #   image: ghcr.io/crunchymonkies/jellyfin-web:latest
