# This rule is not used by the project jellyops itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the jellyfin.jellyops.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: jellyops
    app.kubernetes.io/managed-by: kustomize
  name: jellyfin-editor-role
rules:
- apiGroups:
  - jellyfin.jellyops.io
  resources:
  - jellyfins
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - jellyfin.jellyops.io
  resources:
  - jellyfins/status
  verbs:
  - get
